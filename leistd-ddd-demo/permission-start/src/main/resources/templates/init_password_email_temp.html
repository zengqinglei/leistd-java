<!DOCTYPE html>
<html lang="en">
<head>
    <style type="text/css">
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
    <style type="text/css">
        body {
            font-size: 14px;
            font-family: arial, verdana, sans-serif;
            line-height: 1.666;
            padding: 0;
            margin: 0;
            overflow: auto;
            white-space: normal;
            word-wrap: break-word;
            min-height: 100px;
        }
        .contain {
            background-color: #f7f8fa;
            width: 860px;
            margin: 0 auto;
            padding: 0 50px;
            box-sizing: border-box;
        }
        .title-wrap {
            padding-top: 22px;
            height: 32px;
            padding-bottom: 20px;
        }
        .logo {
            width: 32px;
            height: 32px;
            margin-right: 8px;
            vertical-align: bottom;
        }
        .title {
            font-size: 20px;
            color: #5d5d5d;
            line-height: 32px;
            display: inline-block;
        }
        .sub-title {
            float: right;
            line-height: 32px;
            font-size: 14px;
            color: #777777;
        }
        .main {
            background-color: #fff;
            border-top: 2px solid #507afe;
            padding: 24px 30px;
            padding-top: 40px;
            box-sizing: border-box;
            box-shadow: 0px 2px 2px 0px rgba(155, 155, 155, 0.2);
        }
        .hello h1 {
            font-size: 18px;
            color: #222222;
            line-height: 24px;
            margin: 0;
        }
        .hello h1 + h1 {
            margin-top: 8px;
        }
        p.info {
            margin: 16px 0;
            font-size: 14px;
            color: #666666;
            line-height: 24px;
        }
        p.info span {
            font-weight: 700;
        }
        .form {
            margin-bottom: 50px;
        }
        .form .form-item + .form-item {
            margin-top: 6px;
        }
        .form .form-item .form-label,
        .form .form-item .form-value {
            display: inline-block;
            line-height: 24px;
            font-size: 14px;
        }
        .form .form-item .form-label {
            width: 100px;
            color: #999999;
        }
        .form .form-item .form-value {
            color: #222222;
        }
        .form .form-item .form-value a {
            color: #507afe;
            display: inline;
        }
        p.describe {
            margin: 0;
            font-size: 14px;
            color: #666666;
            line-height: 24px;
        }
        p.describe + p.describe {
            margin-top: 6px;
        }
        p.describe + hr {
            border: none;
            border-top: 1px solid #e9ebee;
            margin: 16px 0;
        }
        p.inscribe {
            margin: 0;
            font-size: 14px;
            color: #222222;
            line-height: 20px;
        }
        p.date {
            margin: 6px 0 0 0;
            font-size: 12px;
            color: #666666;
            line-height: 20px;
        }
        .footer {
            width: 100%;
            margin-top: 20px;
        }
        .footer p {
            margin: 0;
            text-align: center;
            font-size: 12px;
            color: #777777;
            line-height: 20px;
        }
        .footer p  + p {
            margin-top: 4px;
        }
    </style>
</head>
